name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: |
          set -e
          for attempt in 1 2 3 4 5; do
            echo "Install attempt $attempt"
            if npm install --no-fund --no-audit; then
              test -f node_modules/vite/package.json
              exit 0
            fi
            sleep 15
          done
          exit 1
      - run: npm run build
        env:
          MODEL_URN: ${{ vars.MODEL_URN }}
          TOKEN_URL: ${{ vars.TOKEN_URL }}
          APS_ENV: ${{ vars.APS_ENV }}
          VITE_BASE_PATH: /prototype-environment/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
